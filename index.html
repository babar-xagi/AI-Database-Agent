<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Chatbot</title>

<style>
body {
    margin: 0;
    background: #0d1117;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#chat {
    width: 430px;
    height: 95vh;
    background: #161b22;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.msg {
    max-width: 80%;
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 14px;
    line-height: 1.4;
}
.user { background: #238636; align-self: flex-end; }
.bot { background: #30363d; align-self: flex-start; }

#input-area {
    display: flex;
    padding: 12px;
    background: #0d1117;
    border-top: 1px solid #30363d;
}

#input {
    flex: 1;
    padding: 10px;
    background: #21262d;
    color: white;
    border: none;
    outline: none;
    border-radius: 8px;
}

#send {
    margin-left: 8px;
    padding: 10px 18px;
    background: #238636;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="chat">
    <div id="messages"></div>

    <div id="input-area">
        <input id="input" type="text" autocomplete="off" spellcheck="false"
               placeholder="Type here... (e.g. add ali 10 cs)">
        <button id="send">Send</button>
    </div>
</div>

<script>
const API = "http://127.0.0.1:8000/chat";
const messagesBox = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");


// ⭐ Disable ALL browser shortcuts (NO REFRESH EVER)
window.addEventListener("keydown", function(e) {
    if (
        e.key === "F5" ||
        (e.ctrlKey && e.key === "r") ||
        (e.ctrlKey && e.key === "R") ||
        (e.metaKey && e.key === "r") ||
        (e.ctrlKey && e.key === "s") ||
        (e.ctrlKey && e.key === "S") ||
        (e.altKey && e.key === "s") ||
        (e.altKey && e.key === "S")
    ) {
        e.preventDefault();
    }
});


// ⭐ Disable any accidental form submit
document.addEventListener("submit", e => e.preventDefault());


// ⭐ Add message to chat
function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    messagesBox.appendChild(div);
    messagesBox.scrollTop = messagesBox.scrollHeight;
}


// ⭐ Send to API
async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const loader = document.createElement("div");
    loader.className = "msg bot";
    loader.innerText = "Typing...";
    messagesBox.appendChild(loader);
    messagesBox.scrollTop = messagesBox.scrollHeight;

    try {
        const res = await fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        loader.innerText = data.response;

    } catch (e) {
        loader.innerText = "Error: " + e.message;
    }
}


// ⭐ Enter key sends message
input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

sendBtn.onclick = sendMessage;

</script>

</body>
</html>
